<!doctype html>
<meta charset="utf-8">
<title>Options Page</title>
<script src="./script.js"></script>
<link href="./style.css" rel="stylesheet" type="text/css"/>

<fieldset>
  <legend id="browserActionAction-label"></legend>
  <label>
    <input type="radio" name="browserActionAction" value="menu">
    <span id="browserActionAction-menu-label"></span>
  </label>
  <label>
    <input type="radio" name="browserActionAction" value="entire">
    <span id="browserActionAction-entire-label"></span>
  </label>
  <label>
    <input type="radio" name="browserActionAction" value="visible">
    <span id="browserActionAction-visible-label"></span>
  </label>
  <label>
    <input type="radio" name="browserActionAction" value="select">
    <span id="browserActionAction-select-label"></span>
  </label>
</fieldset>

<label>
  <input type="checkbox" id="openDirectory">
  <span id="openDirectory-label"></span>
</label>

<button type="button" id="manageShortcuts"></button>
